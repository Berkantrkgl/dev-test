apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-argo-application
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Berkantrkgl/dev-test.git
    path: .
    targetRevision: HEAD

  destination:
    server: https://kubernetes.default.svc # Burada şu anda ArgoCD ve destionation cluster aynı yeri gösteriyor.
    namespace: myapp

  syncPolicy:
    syncOptions:
      - CreateNamespace=true

    automated:
      selfHeal: true
      prune: true
